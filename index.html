<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GymLog">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>GymLog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1c1c1e; --surface2: #2c2c2e;
      --push: #3b82f6; --pull: #ef4444; --legs: #22c55e; --rest: #6b7280;
      --text: #f0f0f0; --text2: #8e8e93; --border: #38383a; --radius: 14px;
    }
    html { height: 100%; background: var(--bg); }
    body {
      max-width: 430px; margin: 0 auto; min-height: 100%;
      overflow-x: hidden; color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased; background: var(--bg);
    }
    .header {
      padding: max(env(safe-area-inset-top), 16px) 16px 12px;
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .header-eyebrow { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
    .header-title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
    .split-selector { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 12px 16px 0; }
    .split-btn {
      padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent;
    }
    .split-btn .si { display: block; font-size: 18px; margin-bottom: 3px; }
    .split-btn.ap { background: var(--push); border-color: var(--push); color: #fff; }
    .split-btn.al { background: var(--pull); border-color: var(--pull); color: #fff; }
    .split-btn.ag { background: var(--legs); border-color: var(--legs); color: #052e16; }
    .split-btn.ar { background: var(--rest); border-color: var(--rest); color: #fff; }
    .content { padding: 12px 16px 140px; }
    .exercise-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .exercise-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 0; }
    .exercise-name { font-size: 16px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .exercise-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: var(--surface2); border: none; color: var(--text2);
      width: 30px; height: 30px; border-radius: 8px; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .last-session { padding: 6px 14px 8px; }
    .last-session-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .last-sets-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .last-chip { background: var(--surface2); border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--text2); }
    .first-time-badge { font-size: 11px; color: var(--push); padding: 4px 14px 8px; font-weight: 500; }
    .sets-container { padding: 0 14px 4px; }
    .set-block { margin-bottom: 14px; }
    .set-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .set-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
    .set-del { background: none; border: none; color: var(--border); font-size: 20px; line-height: 1; cursor: pointer; padding: 0 2px; -webkit-tap-highlight-color: transparent; }
    .set-field {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
    }
    .set-field:last-child { margin-bottom: 0; }
    .set-input {
      flex: 1; min-width: 0; background: none; border: none; outline: none;
      color: var(--text); font-size: 20px; font-weight: 600;
      padding: 0; -webkit-appearance: none; appearance: none;
    }
    .set-input::placeholder { color: var(--border); font-weight: 400; }
    .set-unit { color: var(--text2); font-size: 13px; margin-left: 8px; flex-shrink: 0; }
    .add-set-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px 12px; background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .add-exercise-btn { width: 100%; padding: 16px; background: var(--surface); border: 1.5px dashed var(--border); border-radius: var(--radius); color: var(--text2); font-size: 15px; cursor: pointer; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
    .centered-state { text-align: center; padding: 60px 32px; }
    .state-icon { font-size: 56px; margin-bottom: 16px; display: block; }
    .state-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .state-sub { color: var(--text2); font-size: 14px; line-height: 1.5; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; }
    .overlay.hidden { display: none; }
    .sheet { background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); width: 100%; }
    .hist-sheet-inner { background: #1c1c1e; border-radius: 20px 20px 0 0; width: 100%; max-height: 88vh; display: flex; flex-direction: column; }
    .hist-sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .hist-sheet-title { font-size: 17px; font-weight: 600; }
    .hist-sheet-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: var(--surface2); }
    .hist-sheet-close { background: var(--surface2); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 10px; }
    .hist-sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 20px max(20px, env(safe-area-inset-bottom)); flex: 1; }
    .sheet-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
    .sheet-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px; margin-bottom: 12px; }
    .sheet-input:focus { outline: none; border-color: #555; }
    .chip-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; max-height: 120px; overflow-y: auto; }
    .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 13px; font-size: 13px; color: var(--text2); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .sheet-actions { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 13px; background: var(--surface2); border: none; border-radius: 12px; color: var(--text2); font-size: 16px; cursor: pointer; }
    .btn-confirm { flex: 1; padding: 13px; background: #f0f0f0; border: none; border-radius: 12px; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; background: rgba(15,15,15,0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 100; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; background: none; border: none; color: var(--text2); font-size: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .tab-btn .ti { font-size: 22px; display: block; }
    .tab-btn.active { color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
    .cal-arrow { background: var(--surface); border: none; color: var(--text); width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .cal-month { font-size: 18px; font-weight: 600; }
    .cal-legend { display: flex; gap: 12px; padding: 0 16px 12px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 0 12px 80px; }
    .cal-head { text-align: center; font-size: 11px; color: var(--text2); padding: 3px 0 6px; font-weight: 600; }
    .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .cal-cell.empty { visibility: hidden; pointer-events: none; }
    .cal-cell.today { box-shadow: 0 0 0 2px #fff; }
    .cal-cell.push  { background: var(--push); color: #fff; }
    .cal-cell.pull  { background: var(--pull); color: #fff; }
    .cal-cell.legs  { background: var(--legs); color: #052e16; }
    .cal-cell.rest  { background: var(--surface2); color: var(--text2); }
    .cal-cell.future { color: var(--border); pointer-events: none; }
    .prog-select-wrap { padding: 12px 16px 0; }
    .prog-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px; -webkit-appearance: none; appearance: none; cursor: pointer; }
    .prog-select:focus { outline: none; }
    .chart-wrap { padding: 12px 16px 0; }
    .chart-box { background: var(--surface); border-radius: var(--radius); padding: 16px 16px 10px; }
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 10px 16px 100px; }
    .stat-box { background: var(--surface); border-radius: 12px; padding: 14px 10px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .prog-empty { text-align: center; padding: 40px 24px; color: var(--text2); font-size: 14px; }
    .divider { height: 1px; background: var(--border); margin: 0 14px; }
  </style>
</head>
<body>

<div id="panel-today" class="panel active">
  <div class="header">
    <div class="header-eyebrow" id="today-date"></div>
    <div class="header-title">Today's Workout</div>
  </div>
  <div class="split-selector">
    <button class="split-btn" data-type="Push" onclick="selectType('Push')"><span class="si">🔵</span>Push</button>
    <button class="split-btn" data-type="Pull" onclick="selectType('Pull')"><span class="si">🔴</span>Pull</button>
    <button class="split-btn" data-type="Legs" onclick="selectType('Legs')"><span class="si">🟢</span>Legs</button>
    <button class="split-btn" data-type="Rest" onclick="selectType('Rest')"><span class="si">😴</span>Rest</button>
  </div>
  <div class="content" id="today-content"></div>
</div>

<div id="panel-history" class="panel">
  <div class="header">
    <div class="header-eyebrow">Your Training</div>
    <div class="header-title">History</div>
  </div>
  <div class="cal-nav">
    <button class="cal-arrow" onclick="changeMonth(-1)">&#8249;</button>
    <div class="cal-month" id="cal-month-label"></div>
    <button class="cal-arrow" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="cal-legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--push)"></div>Push</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--pull)"></div>Pull</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--legs)"></div>Legs</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--surface2);border:1px solid var(--border)"></div>Rest</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <p style="text-align:center;color:var(--text2);font-size:13px;padding:0 0 20px">Tap any day to view or edit</p>
</div>

<div id="panel-progress" class="panel">
  <div class="header">
    <div class="header-eyebrow">Weight Over Time</div>
    <div class="header-title">Progress</div>
  </div>
  <div class="prog-select-wrap">
    <select class="prog-select" id="prog-select" onchange="renderProgress()">
      <option value="">Select an exercise...</option>
    </select>
  </div>
  <div class="chart-wrap"><div class="chart-box"><canvas id="prog-chart"></canvas></div></div>
  <div class="stats-row" id="prog-stats"></div>
  <div class="prog-empty" id="prog-empty" style="display:none">No data yet for this exercise.</div>
</div>

<nav class="tabbar">
  <button class="tab-btn active" onclick="switchTab('today',this)"><span class="ti">💪</span>Today</button>
  <button class="tab-btn" onclick="switchTab('history',this)"><span class="ti">📅</span>History</button>
  <button class="tab-btn" onclick="switchTab('progress',this)"><span class="ti">📈</span>Progress</button>
</nav>

<div class="overlay hidden" id="hist-overlay" onclick="if(event.target===this)closeOverlay('hist-overlay')">
  <div class="hist-sheet-inner">
    <div class="hist-sheet-head">
      <div>
        <div class="hist-sheet-title" id="hist-sheet-title"></div>
        <div class="hist-sheet-badge" id="hist-sheet-badge" style="margin-top:4px"></div>
      </div>
      <button class="hist-sheet-close" onclick="closeOverlay('hist-overlay')">&#x2715;</button>
    </div>
    <div class="hist-sheet-body" id="hist-sheet-body"></div>
  </div>
</div>

<div class="overlay hidden" id="add-overlay" onclick="if(event.target===this)closeOverlay('add-overlay')">
  <div class="sheet">
    <div class="sheet-title">Add Exercise</div>
    <input class="sheet-input" id="add-input" type="text" placeholder="e.g. Bench Press" autocomplete="off"
      oninput="filterChips(this.value)" onkeydown="if(event.key==='Enter')confirmAdd()">
    <div class="chip-grid" id="chip-grid"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('add-overlay')">Cancel</button>
      <button class="btn-confirm" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="rename-overlay" onclick="if(event.target===this)closeOverlay('rename-overlay')">
  <div class="sheet">
    <div class="sheet-title">Rename Exercise</div>
    <input class="sheet-input" id="rename-input" type="text" autocomplete="off"
      onkeydown="if(event.key==='Enter')confirmRename()">
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('rename-overlay')">Cancel</button>
      <button class="btn-confirm" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<script>
const KEY = 'gymlog_v2';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {workouts:{}}; } catch { return {workouts:{}}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

const TODAY = todayStr();
let _ad = TODAY, _ac = 'today-content';

const PUSH_EX = ['Bench Press','Incline Bench Press','Overhead Press','Dumbbell Press','Incline DB Press','Lateral Raise','Cable Fly','Chest Fly','Tricep Pushdown','Skull Crusher','Dips','Push Up'];
const PULL_EX = ['Deadlift','Barbell Row','Pull Up','Chin Up','Lat Pulldown','Seated Cable Row','Single Arm Row','Face Pull','Bicep Curl','Hammer Curl','Cable Curl','T-Bar Row','Shrug'];
const LEGS_EX = ['Squat','Front Squat','Leg Press','Romanian Deadlift','Bulgarian Split Squat','Leg Extension','Leg Curl','Calf Raise','Hip Thrust','Goblet Squat','Hack Squat','Lunges'];

function suggestionsFor(t) { return t==='Push'?PUSH_EX:t==='Pull'?PULL_EX:t==='Legs'?LEGS_EX:[...new Set([...PUSH_EX,...PULL_EX,...LEGS_EX])].sort(); }

function getLastSession(name, before) {
  const data=load();
  for (const d of Object.keys(data.workouts).filter(d=>d<before).sort().reverse()) {
    const ex=(data.workouts[d].exercises||[]).find(e=>e.name===name);
    if (ex && ex.sets && ex.sets.some(s=>s.w)) return {date:d,sets:ex.sets};
  }
  return null;
}

function getLastWorkoutOfType(type) {
  const data=load();
  const dates=Object.keys(data.workouts).filter(d=>d<TODAY&&data.workouts[d].type===type).sort().reverse();
  return dates.length?data.workouts[dates[0]]:null;
}

function buildSetHtml(ei,si,s,last) {
  const phW=last?((last.sets[si]||last.sets[last.sets.length-1]||{}).w||''):'';
  const phR=last?((last.sets[si]||last.sets[last.sets.length-1]||{}).r||''):'';
  return '<div class="set-block">' +
    '<div class="set-block-header"><span class="set-label">Set '+(si+1)+'</span>' +
    '<button class="set-del" onclick="delSet('+ei+','+si+')">&#xD7;</button></div>' +
    '<div class="set-field"><input class="set-input" type="number" inputmode="decimal" autocomplete="off" ' +
    'placeholder="'+(phW||'0')+'" value="'+(s.w||'')+'" ' +
    'onchange="setVal('+ei+','+si+',\'w\',this.value)" onfocus="this.select()">' +
    '<span class="set-unit">lbs</span></div>' +
    '<div class="set-field"><input class="set-input" type="number" inputmode="numeric" autocomplete="off" ' +
    'placeholder="'+(phR||'0')+'" value="'+(s.r||'')+'" ' +
    'onchange="setVal('+ei+','+si+',\'r\',this.value)" onfocus="this.select()">' +
    '<span class="set-unit">reps</span></div></div>';
}

function renderExercises(dateStr, containerId) {
  _ad=dateStr; _ac=containerId;
  const data=load(); const w=data.workouts[dateStr]||{};
  const container=document.getElementById(containerId);
  if(!container) return;
  const exercises=w.exercises||[];
  let html='';
  exercises.forEach(function(ex,ei) {
    const last=getLastSession(ex.name,dateStr);
    const lastHtml=last
      ?'<div class="last-session"><div class="last-session-label">Last &middot; '+fmtDate(last.date)+'</div>' +
        '<div class="last-sets-row">'+last.sets.filter(function(s){return s.w;}).map(function(s,i){return '<span class="last-chip">Set '+(i+1)+': '+s.w+'lbs &times; '+s.r+'</span>';}).join('')+'</div></div>'
      :'<div class="first-time-badge">&#10022; First time</div>';
    const sets=(ex.sets&&ex.sets.length)?ex.sets:[{w:'',r:''}];
    const setsHtml=sets.map(function(s,si){return buildSetHtml(ei,si,s,last);}).join('');
    html+='<div class="exercise-card">' +
      '<div class="exercise-header"><div class="exercise-name">'+ex.name+'</div>' +
      '<div class="exercise-actions">' +
      '<button class="icon-btn" onclick="openRename('+ei+')">&#9999;&#65039;</button>' +
      '<button class="icon-btn" onclick="delExercise('+ei+')">&#128465;</button>' +
      '</div></div>'+lastHtml+'<div class="divider"></div>' +
      '<div class="sets-container">'+setsHtml+'</div>' +
      '<button class="add-set-btn" onclick="addSet('+ei+')">+ Add Set</button></div>';
  });
  html+='<button class="add-exercise-btn" onclick="openAddSheet()">+ Add Exercise</button>';
  container.innerHTML=html;
}

function renderToday() {
  const data=load(); const w=data.workouts[TODAY]||{};
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.querySelectorAll('.split-btn').forEach(function(btn){
    btn.className='split-btn';
    if(w.type&&btn.dataset.type===w.type) btn.classList.add(w.type==='Push'?'ap':w.type==='Pull'?'al':w.type==='Legs'?'ag':'ar');
  });
  const content=document.getElementById('today-content');
  if(!w.type){content.innerHTML='<div class="centered-state"><span class="state-icon">💪</span><div class="state-title">Pick your split above</div><div class="state-sub">Last session loads automatically.</div></div>';return;}
  if(w.type==='Rest'){content.innerHTML='<div class="centered-state"><span class="state-icon">😴</span><div class="state-title">Rest Day</div><div class="state-sub">Recover well.</div></div>';return;}
  renderExercises(TODAY,'today-content');
}

function hasLoggedWeights(exercises) {
  return (exercises||[]).some(function(ex){return ex.sets&&ex.sets.some(function(s){return s.w&&s.w!=='';});});
}

function selectType(type) {
  const data=load();
  if(!data.workouts[TODAY]) data.workouts[TODAY]={exercises:[]};
  data.workouts[TODAY].type=type;
  if(type!=='Rest') {
    if(!hasLoggedWeights(data.workouts[TODAY].exercises)) {
      const lw=getLastWorkoutOfType(type);
      data.workouts[TODAY].exercises=lw&&lw.exercises?lw.exercises.map(function(ex){return {name:ex.name,sets:[{w:'',r:''}]};}):[]; 
    }
  } else {
    if(!hasLoggedWeights(data.workouts[TODAY].exercises)) data.workouts[TODAY].exercises=[];
  }
  save(data); renderToday();
}

function rerender() { if(_ad===TODAY) renderToday(); else renderHistSheet(_ad); }

function setVal(ei,si,field,val) {
  const data=load(); const ex=data.workouts[_ad]&&data.workouts[_ad].exercises[ei];
  if(!ex) return;
  if(!ex.sets[si]) ex.sets[si]={w:'',r:''};
  ex.sets[si][field]=val; save(data);
}

function addSet(ei) {
  const data=load(); const ex=data.workouts[_ad]&&data.workouts[_ad].exercises[ei];
  if(!ex) return;
  const last=(ex.sets&&ex.sets.length)?ex.sets[ex.sets.length-1]:{w:'',r:''};
  ex.sets.push({w:last.w,r:last.r}); save(data); rerender();
}

function delSet(ei,si) {
  const data=load(); const ex=data.workouts[_ad]&&data.workouts[_ad].exercises[ei];
  if(!ex) return;
  ex.sets.splice(si,1); if(!ex.sets.length) ex.sets=[{w:'',r:''}];
  save(data); rerender();
}

function delExercise(ei) {
  const data=load(); const w=data.workouts[_ad]; if(!w) return;
  w.exercises.splice(ei,1); save(data); rerender();
}

var _chips=[];
function openAddSheet() {
  const data=load(); const type=data.workouts[_ad]&&data.workouts[_ad].type;
  _chips=suggestionsFor(type);
  document.getElementById('add-input').value='';
  renderChips(_chips); openOverlay('add-overlay');
  setTimeout(function(){document.getElementById('add-input').focus();},200);
}
function filterChips(val){renderChips(_chips.filter(function(s){return s.toLowerCase().includes(val.toLowerCase());}));}
function renderChips(list){document.getElementById('chip-grid').innerHTML=list.slice(0,12).map(function(s){return '<div class="chip" onclick="pickChip(\''+s.replace(/'/g,"\\'")+'\')">' +s+'</div>';}).join('');}
function pickChip(n){document.getElementById('add-input').value=n;}
function confirmAdd(){
  const name=document.getElementById('add-input').value.trim(); if(!name) return;
  const data=load();
  if(!data.workouts[_ad]) data.workouts[_ad]={exercises:[]};
  data.workouts[_ad].exercises=data.workouts[_ad].exercises||[];
  data.workouts[_ad].exercises.push({name:name,sets:[{w:'',r:''}]});
  save(data); closeOverlay('add-overlay'); rerender();
}

var _ri=-1;
function openRename(ei){
  _ri=ei; const data=load(); const ex=data.workouts[_ad]&&data.workouts[_ad].exercises[ei]; if(!ex) return;
  document.getElementById('rename-input').value=ex.name; openOverlay('rename-overlay');
  setTimeout(function(){var i=document.getElementById('rename-input');i.focus();i.select();},200);
}
function confirmRename(){
  const name=document.getElementById('rename-input').value.trim(); if(!name||_ri<0) return;
  const data=load(); const ex=data.workouts[_ad]&&data.workouts[_ad].exercises[_ri]; if(!ex) return;
  ex.name=name; save(data); closeOverlay('rename-overlay'); rerender();
}

function openOverlay(id){document.getElementById(id).classList.remove('hidden');}
function closeOverlay(id){document.getElementById(id).classList.add('hidden');}

var calM=new Date().getMonth(), calY=new Date().getFullYear();
function renderCalendar(){
  const data=load();
  document.getElementById('cal-month-label').textContent=new Date(calY,calM).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var HEADS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var html=HEADS.map(function(d){return '<div class="cal-head">'+d+'</div>';}).join('');
  var first=new Date(calY,calM,1).getDay(), days=new Date(calY,calM+1,0).getDate();
  for(var i=0;i<first;i++) html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=days;d++){
    var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var w=data.workouts[ds]; var cls='cal-cell';
    if(w&&w.type) cls+=' '+w.type.toLowerCase();
    if(ds===TODAY) cls+=' today';
    if(ds>TODAY) cls+=' future';
    html+='<div class="'+cls+'" onclick="showDay(\''+ds+'\')">'+d+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
}
function changeMonth(dir){
  calM+=dir; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} renderCalendar();
}
function showDay(ds){
  const data=load(); const w=data.workouts[ds];
  const d=new Date(ds+'T12:00:00');
  document.getElementById('hist-sheet-title').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const badge=document.getElementById('hist-sheet-badge');
  const colors={Push:'var(--push)',Pull:'var(--pull)',Legs:'var(--legs)',Rest:'var(--rest)'};
  if(w&&w.type){badge.textContent=w.type;badge.style.color=colors[w.type]||'var(--text2)';badge.style.display='';}
  else{badge.style.display='none';}
  renderHistSheet(ds); openOverlay('hist-overlay');
}
function renderHistSheet(ds){
  _ad=ds; _ac='hist-sheet-body';
  const data=load(); const w=data.workouts[ds];
  const body=document.getElementById('hist-sheet-body');
  if(!w||!w.type){body.innerHTML='<div style="color:var(--text2);font-size:14px;padding:16px 0">No workout logged.</div>';return;}
  if(w.type==='Rest'){body.innerHTML='<div style="color:var(--text2);font-size:14px;padding:16px 0">Rest day 😴</div>';return;}
  renderExercises(ds,'hist-sheet-body');
}

var _chart=null;
function populateProgressSelect(){
  const data=load(); const names=new Set();
  Object.values(data.workouts).forEach(function(w){(w.exercises||[]).forEach(function(ex){names.add(ex.name);});});
  const sel=document.getElementById('prog-select'); const cur=sel.value;
  sel.innerHTML='<option value="">Select an exercise...</option>';
  [...names].sort().forEach(function(n){sel.innerHTML+='<option value="'+n+'"'+(n===cur?' selected':'')+'>'+n+'</option>';});
}
function renderProgress(){
  const name=document.getElementById('prog-select').value; const data=load();
  document.getElementById('prog-stats').innerHTML='';
  document.getElementById('prog-empty').style.display='none';
  if(_chart){_chart.destroy();_chart=null;} if(!name) return;
  var pts=[];
  Object.entries(data.workouts).sort(function(a,b){return a[0]<b[0]?-1:1;}).forEach(function(entry){
    var date=entry[0],w=entry[1];
    var ex=(w.exercises||[]).find(function(e){return e.name===name;});
    if(ex){var top=Math.max.apply(null,(ex.sets||[]).map(function(s){return parseFloat(s.w)||0;}));if(top>0) pts.push({label:fmtDate(date),weight:top});}
  });
  if(!pts.length){document.getElementById('prog-empty').style.display='block';return;}
  var ctx=document.getElementById('prog-chart').getContext('2d');
  _chart=new Chart(ctx,{type:'line',data:{labels:pts.map(function(p){return p.label;}),datasets:[{data:pts.map(function(p){return p.weight;}),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.12)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#3b82f6',pointBorderColor:'#0f0f0f',pointBorderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y+' lbs';}}}},scales:{x:{ticks:{color:'#8e8e93',font:{size:11}},grid:{color:'#2c2c2e'}},y:{ticks:{color:'#8e8e93',font:{size:11},callback:function(v){return v+' lbs';}},grid:{color:'#2c2c2e'}}}}});
  var weights=pts.map(function(p){return p.weight;}); var gain=weights[weights.length-1]-weights[0];
  document.getElementById('prog-stats').innerHTML='<div class="stat-box"><div class="stat-val">'+Math.max.apply(null,weights)+'</div><div class="stat-lbl">Best (lbs)</div></div><div class="stat-box"><div class="stat-val">'+weights[weights.length-1]+'</div><div class="stat-lbl">Recent (lbs)</div></div><div class="stat-box"><div class="stat-val" style="color:'+(gain>=0?'var(--legs)':'var(--pull)')+'">'+(gain>=0?'+':'')+gain+'</div><div class="stat-lbl">Total Gain</div></div>';
}

function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active'); btn.classList.add('active');
  if(name!=='history'){_ad=TODAY;_ac='today-content';}
  if(name==='history') renderCalendar();
  if(name==='progress'){populateProgressSelect();renderProgress();}
}

if('serviceWorker' in navigator) window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
renderToday();
</script>
